name: Security

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read
  actions: read
  security-events: write

env:
  CI_RUNNER: ${{ vars.CI_RUNNER || 'latest' }}
  TRIVY_SEVERITY: CRITICAL,HIGH
  NANCY_VERSION: latest

jobs:
  catalog:
    name: Cargar catalogo de librerias
    runs-on: ${{ vars.CI_RUNNER || 'latest' }}
    outputs:
      security_json: ${{ steps.catalog.outputs.security_json }}
    steps:
      - uses: actions/checkout@v4

      - name: Leer librerias security desde catalogo
        id: catalog
        shell: bash
        run: |
          set -euo pipefail
          CATALOG_FILE=".github/libraries.json"
          [[ -f "$CATALOG_FILE" ]] || { echo "No existe $CATALOG_FILE"; exit 1; }

          SECURITY_JSON="$(jq -c '[.libraries[] | select(.security == true) | .path]' "$CATALOG_FILE")"
          [[ "$SECURITY_JSON" != "[]" ]] || { echo "No hay librerias security en $CATALOG_FILE"; exit 1; }

          echo "security_json=${SECURITY_JSON}" >> "$GITHUB_OUTPUT"
          echo "Librerias security: ${SECURITY_JSON}"

  gosec:
    name: Gosec
    needs: [catalog]
    runs-on: ${{ vars.CI_RUNNER || 'latest' }}
    strategy:
      matrix:
        library: ${{ fromJson(needs.catalog.outputs.security_json) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.library }}/go.mod
          cache: true
          cache-dependency-path: ${{ matrix.library }}/go.sum

      - name: Instalar herramientas de CI
        working-directory: ./${{ matrix.library }}
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          make go-tools

      - name: Descargar dependencias
        working-directory: ./${{ matrix.library }}
        run: make deps

      - name: Ejecutar Gosec
        working-directory: ./${{ matrix.library }}
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          make gosec

  trivy:
    name: Trivy
    runs-on: ${{ vars.CI_RUNNER || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Ejecutar Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: ${{ env.TRIVY_SEVERITY }}

      - name: Subir resultados SARIF de Trivy
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  nancy:
    name: Nancy
    needs: [catalog]
    runs-on: ${{ vars.CI_RUNNER || 'latest' }}
    env:
      OSSINDEX_USERNAME: ${{ secrets.OSSINDEX_USERNAME }}
      OSSINDEX_TOKEN: ${{ secrets.OSSINDEX_TOKEN }}
    strategy:
      matrix:
        library: ${{ fromJson(needs.catalog.outputs.security_json) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.library }}/go.mod
          cache: true
          cache-dependency-path: ${{ matrix.library }}/go.sum

      - name: Instalar herramientas de CI
        working-directory: ./${{ matrix.library }}
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          make go-tools
          make deps
          go install github.com/sonatype-nexus-community/nancy@${{ env.NANCY_VERSION }}

      - name: Ejecutar Nancy (OSS Index autenticado)
        if: ${{ env.OSSINDEX_USERNAME != '' && env.OSSINDEX_TOKEN != '' }}
        working-directory: ./${{ matrix.library }}
        run: |
          go list -json -deps ./... | nancy sleuth \
            --skip-update-check \
            --username "$OSSINDEX_USERNAME" \
            --token "$OSSINDEX_TOKEN"

      - name: Omitir Nancy (faltan credenciales OSS Index)
        if: ${{ env.OSSINDEX_USERNAME == '' || env.OSSINDEX_TOKEN == '' }}
        working-directory: ./${{ matrix.library }}
        run: |
          echo "OSSINDEX_USERNAME/OSSINDEX_TOKEN no estan configurados. Se omite Nancy para evitar errores OSS Index 401."
